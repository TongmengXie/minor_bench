global:
  model_name: llama-3.1-8b-instruct
  provider: scaleway
  prompt_pack_path: prompt_packs/minorbench_hateful.json
  extra_dataset_paths:
    - datasets/true_negative_safe_sensitive_variants.jsonl
  k: 5
  batch_size: 8
  include_variants: []
  exclude_variants: []
  safety_judge_model: meta-llama/Llama-3.2-1B-Instruct
  safety_judge_provider: local_hf
  config:
    max_new_tokens: 96
    judge_max_new_tokens: 96
    judge_batch_size: 2
    judge_retry_on_malformed: true
    judge_retry_max_attempts: 1

rows:
  - id: system_prompt_generic
    system_prompt_name: generic_child_tutor_v1

  - id: system_prompt_duolingo
    system_prompt_name: duolingo_tutor_v1
