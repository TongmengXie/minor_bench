global:
  model_name: llama-3.1-8b-instruct
  provider: scaleway
  prompt_pack_path: prompt_packs/minorbench_hateful.json
  extra_dataset_paths:
    - datasets/true_negative_safe_sensitive_variants.jsonl
  k: 5
  batch_size: 10
  include_variants: []
  exclude_variants: []
  safety_judge_model: meta-llama/Llama-3.2-1B-Instruct
  safety_judge_provider: local_hf
  config:
    judge_batch_size: 32
    judge_retry_on_malformed: true
    judge_retry_max_attempts: 1

rows:
  - id: no_guardrail_policy_v2
    system_prompt_name: assistant_child_safety_v2

  - id: granite_guardrail_policy_v2
    system_prompt_name: assistant_child_safety_v2
    guardrail_model: ibm-granite/granite-guardian-3.2-3b-a800m
    guardrail_provider: local_hf
