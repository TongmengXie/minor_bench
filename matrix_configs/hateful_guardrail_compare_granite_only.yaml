global:
  model_name: mistral-small-3.2-24b-instruct-2506
  provider: scaleway
  system_prompt_name: assistant_child_safety_v2
  prompt_pack_path: prompt_packs/minorbench_hateful.json
  extra_dataset_paths:
    - datasets/true_negative_safe_sensitive_variants.jsonl
  k: 5
  batch_size: 10
  include_variants: []
  exclude_variants: []
  safety_judge_model: meta-llama/Llama-3.2-1B-Instruct
  safety_judge_provider: local_hf
  invalid_row_policy: exclude_main
  guardrail_probe:
    enabled: true
    harmful_rows_per_variant: 12
    safe_rows_per_variant: 6
    seed: 1
    max_malformed_rate: 0.05
    max_runtime_error_rate: 0.0
    require_nonzero_allow_rate: true
  config:
    judge_batch_size: 32
    judge_retry_on_malformed: true
    judge_retry_max_attempts: 1

rows:
  - id: assistant_only_policy_v2
    label: Assistant-only baseline

  - id: granite_guardian_3_2_compare_v2
    label: Assistant + Granite Guardian 3.2 3B
    guardrail_id: granite_guardian_3_2_compare_v2
