global:
  model_name: llama-3.1-8b-instruct
  provider: scaleway
  system_prompt_name: assistant_child_safety_v2
  prompt_pack_path: prompt_packs/minorbench_hateful.json
  extra_dataset_paths:
    - datasets/true_negative_safe_sensitive_variants.jsonl
  k: 5
  batch_size: 10
  include_variants: []
  exclude_variants: []
  safety_judge_model: meta-llama/Llama-3.2-1B-Instruct
  safety_judge_provider: local_hf
  config:
    judge_batch_size: 32
    judge_retry_on_malformed: true
    judge_retry_max_attempts: 1

rows:
  - id: assistant_only_policy_v2
    label: Assistant-only baseline

  - id: granite_guardian_3_2_compare_v2
    label: Assistant + Granite Guardian 3.2 3B
    guardrail_id: granite_guardian_3_2_compare_v2

  - id: granite_guardian_3_3_compare_v2
    label: Assistant + Granite Guardian 3.3 8B
    guardrail_id: granite_guardian_3_3_compare_v2

  - id: nemotron_safety_guard_8b_compare_v2
    label: Assistant + Nemotron Safety Guard 8B
    guardrail_id: nemotron_safety_guard_8b_compare_v2

  - id: wildguard_7b_compare_v2
    label: Assistant + WildGuard 7B
    guardrail_id: wildguard_7b_compare_v2
